<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Solar System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <canvas id="solar-canvas"></canvas>

  <!-- ── Header ── -->
  <header class="header">
    <div class="logo">
      <div class="logo-sun"></div>
      <span>Solar<span class="accent">System</span></span>
    </div>
    <nav class="hint-bar">
      <span class="hint">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
        Drag to rotate
      </span>
      <span class="hint">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        Scroll to zoom
      </span>
      <span class="hint">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
        Click planet for info
      </span>
    </nav>
  </header>

  <!-- ── Speed Dock ── -->
  <div class="speed-dock">
    <span class="dock-label">Orbit Speed</span>
    <div class="dock-buttons">
      <button class="spd-btn" data-speed="0">⏸ Pause</button>
      <button class="spd-btn active" data-speed="1">▶ Normal</button>
      <button class="spd-btn" data-speed="3">⏩ Fast</button>
    </div>
  </div>

  <!-- ── Scene Controls ── -->
  <div class="controls-dock">
    <button class="ctrl-btn" id="reset-camera" title="Reset camera to overview">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
      Reset View
    </button>
    <button class="ctrl-btn active" id="toggle-orbits" title="Toggle orbit lines">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="12" rx="10" ry="4"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      Orbits
    </button>
  </div>

  <!-- ── Info Panel ── -->
  <aside class="info-panel" id="info-panel" aria-hidden="true">
    <button class="close-btn" id="close-panel" aria-label="Close panel">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
    </button>

    <div class="panel-hero">
      <div class="planet-orb" id="planet-orb"></div>
      <h2 class="planet-name" id="planet-name">–</h2>
      <p  class="planet-type" id="planet-type">–</p>
    </div>

    <ul class="stat-grid">
      <li class="stat-item">
        <span class="stat-key">Distance from Sun</span>
        <span class="stat-val" id="stat-distance">–</span>
      </li>
      <li class="stat-item">
        <span class="stat-key">Moons</span>
        <span class="stat-val" id="stat-moons">–</span>
      </li>
      <li class="stat-item">
        <span class="stat-key">Surface Temp</span>
        <span class="stat-val" id="stat-temp">–</span>
      </li>
      <li class="stat-item">
        <span class="stat-key">Orbital Period</span>
        <span class="stat-val" id="stat-period">–</span>
      </li>
      <li class="stat-item">
        <span class="stat-key">Diameter</span>
        <span class="stat-val" id="stat-diameter">–</span>
      </li>
    </ul>

    <button class="focus-btn" id="focus-btn">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Focus Planet
    </button>

    <p class="planet-desc" id="planet-desc"></p>
  </aside>

  <!-- ── Tooltip ── -->
  <div class="tooltip" id="tooltip" role="tooltip"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="script.js"></script>
</body>
</html>
